<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primidi</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amarante&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-center:    #d2d5d4;
            --bg-mid:       #a8adab;
            --bg-edge:      #7a807e;
            --text:         #2c2c2c;
            --muted:        #737373;
            --accent:       #0d7a6b;
            --accent-hover: #0a6357;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            background: radial-gradient(ellipse 100% 85% at 50% 45%, var(--bg-center) 0%, var(--bg-mid) 38%, var(--bg-edge) 100%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .app-logo {
            margin: 0 0 0.5rem 0;
            font-family: "Amarante", serif;
            font-size: 2rem;
            font-weight: 400;
            color: var(--accent);
            letter-spacing: 0.04em;
            text-align: center;
        }
        .app-logo .sc { font-variant: small-caps; }
        .intro {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.5;
            max-width: 20rem;
            text-align: center;
            margin: 0 0 1.5rem 0;
        }
        .intro strong { color: var(--text); }
        p.sub {
            font-size: 0.8rem;
            color: var(--muted);
            margin: 0 0 1.5rem 0;
            line-height: 1.4;
        }
        a.launch {
            display: inline-block;
            padding: 0.65rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        a.launch:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
    <h1 class="app-logo">Pri<span class="sc">midi</span></h1>
    <p class="intro">A 3D piano in the browser: <strong>play with sound</strong>, see <strong>note names</strong> on the keys, use MIDI or your computer keyboard, and move the camera with Space and R.</p>
    <p class="sub">© 2026 Beats Away</p>
    <a class="launch" href="primidi_v1_10/">Launch</a>
</body>
</html>
