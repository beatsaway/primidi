            // Cancel any sustain decay
            if (sustainDecayAutomations.has(midiNote)) {
                const automation = sustainDecayAutomations.get(midiNote);
                if (automation && automation.timeout) {
                    clearTimeout(automation.timeout);
                }
                sustainDecayAutomations.delete(midiNote);
            }
            
            // If sustain pedal is active, mark as sustained instead of releasing
            if (sustainPedalActive) {
                sustainedNotes.add(midiNote);
                // Start gradual decay for sustained note
                startSustainDecay(midiNote);
                // Visual key still releases
                releasePianoKey(midiNote);
                return;
            }
            
            // Release immediately with fade-out
            releaseNoteImmediate(midiNote);
        }
        
        // Release a note immediately with fade-out
        function releaseNoteImmediate(midiNote) {
            const noteData = activeNoteSources.get(midiNote);
            if (!noteData) {
                // No active source, just release visual key
                releasePianoKey(midiNote);
                return;
            }
            
            // Cancel any sustain decay
            if (sustainDecayAutomations.has(midiNote)) {
                const automation = sustainDecayAutomations.get(midiNote);
                if (automation && automation.timeout) {
                    clearTimeout(automation.timeout);
                }
                sustainDecayAutomations.delete(midiNote);
            }
            
            const { source, gainNode } = noteData;
            const ctx = getAudioContext();
            
            // Fade out over release time (300ms)
            const releaseTime = 0.3;
            const now = ctx.currentTime;
            
            // Cancel any scheduled changes
            gainNode.gain.cancelScheduledValues(now);
            
            // Fade to zero
            gainNode.gain.setValueAtTime(gainNode.gain.value, now);
            gainNode.gain.linearRampToValueAtTime(0, now + releaseTime);
            
            // Stop source after fade completes
            try {
                source.stop(now + releaseTime + 0.1); // Small buffer
            } catch (e) {
                // Already stopped, ignore
            }
            
            // Clean up
            activeNoteSources.delete(midiNote);
            sustainedNotes.delete(midiNote);
            physicallyHeldNotes.delete(midiNote);
            // Don't delete noteRegionIndices - keep it so next press cycles to next region
            releasePianoKey(midiNote);
        }
        
        // Release all notes (for window blur, etc.)
        function releaseAllNotes() {
            // Cancel all sustain decay automations
            sustainDecayAutomations.forEach((automation, midiNote) => {
                if (automation && automation.timeout) {
                    clearTimeout(automation.timeout);
                }
            });
            sustainDecayAutomations.clear();
            
            // Release all active notes
            const notesToRelease = Array.from(activeNoteSources.keys());
            notesToRelease.forEach(midiNote => {
                releaseNoteImmediate(midiNote);
            });
            
            // Clear all tracking
            activeNoteSources.clear();
            sustainedNotes.clear();
            physicallyHeldNotes.clear();
            
            console.log('All notes released');
        }
        
        // Play note using Play Anote mechanism with pitch adjustment
        async function playNoteFromPiano(midiNote, velocity = 100) {
            if (regions.length === 0) {
                console.log('No regions available');
                return;
            }

            // Ensure piano is still visible (canvas is now directly on body, no container needed)

            // Check if note is already playing - if so, release it first
            if (activeNoteSources.has(midiNote)) {
                releaseNoteImmediate(midiNote);
            }
            
            // Cycle through regions - each note has its own region index
            let noteRegionIndex = noteRegionIndices.get(midiNote);
            if (noteRegionIndex === undefined) {
                // First time playing this note - use global index
                noteRegionIndex = currentPianoRegionIndex;
                currentPianoRegionIndex = (currentPianoRegionIndex + 1) % regions.length;
            } else {
                // Cycle to next region for this specific note
                noteRegionIndex = (noteRegionIndex + 1) % regions.length;
            }
            noteRegionIndices.set(midiNote, noteRegionIndex);
            const regionIndex = noteRegionIndex;

            const selectedRegion = regions[regionIndex];
            const targetFrequency = midiNoteToFrequency(midiNote);

            try {
                const ctx = getAudioContext();
                if (ctx.state === 'suspended') {
                    await ctx.resume();
                }

                const sampleRate = audioBuffer.sampleRate;
                const regionStartSample = Math.floor(selectedRegion.startTime * sampleRate);
                const regionEndSample = Math.floor(selectedRegion.endTime * sampleRate);
                const regionLength = regionEndSample - regionStartSample;

                if (regionLength < 512) {
                    console.log('Region too short');
                    return;
                }

                const regionData = audioData.subarray(regionStartSample, regionEndSample);
                
                // Get original note from region, or detect pitch if not available
                let originalFrequency = null;
                
                if (selectedRegion && selectedRegion.note) {
                    originalFrequency = noteNameToFrequency(selectedRegion.note);
                } else {
                    const detectedPitch = detectPitchFast(regionData, sampleRate);
                    if (detectedPitch && detectedPitch > 50 && detectedPitch < 2000) {
                        originalFrequency = detectedPitch;
                    }
                }
                
                // Create buffer from region for looping
                const targetDuration = 1.0;
                const targetLength = Math.floor(sampleRate * targetDuration);
                const buffer = ctx.createBuffer(1, targetLength, sampleRate);
                const outputData = buffer.getChannelData(0);
                
                // Fill buffer with looped region data
                for (let i = 0; i < targetLength; i++) {
                    const sourceIndex = i % regionLength;
                    outputData[i] = regionData[sourceIndex];
                }

                // Simple fade in at start to prevent clicks (no crossfade at end - let natural loop handle it)
                const fadeSamples = Math.floor(sampleRate * 0.01); // 10ms fade in
                for (let i = 0; i < fadeSamples && i < targetLength; i++) {
                    const fade = i / fadeSamples;
                    outputData[i] *= fade;
                }

                // Create source and enable looping
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                source.loop = true; // Enable looping for sustained playback
                source.loopStart = 0;
                source.loopEnd = buffer.duration;
                
                // Create gain node for volume control and release fade
                const gainNode = ctx.createGain();
                gainNode.gain.value = 1.0;
                
                // Adjust pitch
                if (originalFrequency && originalFrequency > 50 && originalFrequency < 2000) {
                    const playbackRate = targetFrequency / originalFrequency;
                    source.playbackRate.value = playbackRate;
                }
                
                // Connect: source -> gainNode -> destination
                source.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                // Start playing
                source.start(0);
                
                // Mark as physically held
                physicallyHeldNotes.add(midiNote);
                
                // Track this note with region index
                activeNoteSources.set(midiNote, { source, gainNode, buffer, regionIndex });
                
                // Start gradual decay (even when held, notes fade out slowly like real piano)
                startSustainDecay(midiNote);
                
                // Visual feedback
                pressPianoKey(midiNote);
                
                // Clean up when source ends (shouldn't happen with looping, but safety)
                source.onended = () => {
                    activeNoteSources.delete(midiNote);
                    releasePianoKey(midiNote);
                };
                
            } catch (error) {
                console.error('Error playing note:', error);
                releasePianoKey(midiNote);
            }
        }

        // Initialize MIDI and keyboard input
        function initializePianoInput() {
            // MIDI input - requires user gesture for permission
            if (window.initMidiInput) {
                try {
                    window.initMidiInput(
                        (midiNote, velocity) => {
                            playNoteFromPiano(midiNote, velocity);
                        },
                        (midiNote) => {
                            releaseNote(midiNote);
                        },
                        (controller, value) => {
                            // Handle sustain pedal (controller 64)
                            if (controller === 64) {
                                const wasActive = sustainPedalActive;
                                sustainPedalActive = value >= 64; // >= 64 means pedal down
                                
                                // If pedal released, release all sustained notes
                                if (wasActive && !sustainPedalActive) {
                                    const notesToRelease = Array.from(sustainedNotes);
                                    notesToRelease.forEach(midiNote => {
                                        releaseNoteImmediate(midiNote);
                                    });
                                } else if (sustainPedalActive) {
                                    // Pedal pressed - restart decay for all active notes with longer time
                                    activeNoteSources.forEach((noteData, midiNote) => {
                                        if (!physicallyHeldNotes.has(midiNote)) {
                                            startSustainDecay(midiNote);
                                        }
                                    });
                                }
                            }
                        }
                    );
                    console.log('MIDI input initialized');
                } catch (error) {
                    console.warn('Failed to initialize MIDI input:', error);
                }
            } else {
                console.warn('initMidiInput function not available');
            }

            // Keyboard input - doesn't require permission
            if (window.initKeypressInput) {
                try {
                    window.initKeypressInput(
                        (midiNote, velocity) => {
                            playNoteFromPiano(midiNote, velocity);
                        },
                        (midiNote) => {
                            releaseNote(midiNote);
                        }
                    );
                    console.log('Keyboard input initialized');
                } catch (error) {
                    console.warn('Failed to initialize keyboard input:', error);
                }
            } else {
                console.warn('initKeypressInput function not available');
            }
            
            // Handle window blur to release all notes (prevents ghost notes)
            window.addEventListener('blur', () => {
                releaseAllNotes();
            });
        }

        // Track if piano is initialized
        let pianoInitialized = false;
        let pianoInputInitialized = false;

        // Initialize 3D piano after audio loads
        window.addEventListener('DOMContentLoaded', async () => {
            // Wait a bit for modules to load
            setTimeout(async () => {
                if (!pianoInitialized) {
                    await initialize3DPiano();
                    pianoInitialized = true;
                }
            }, 1000);
        });

        // Initialize MIDI input on user interaction (required for permission)
        function initializePianoInputOnUserInteraction() {
            if (pianoInputInitialized) return;
            
            initializePianoInput();
            pianoInputInitialized = true;
        }

        // Request MIDI permission on first user click
        document.addEventListener('click', initializePianoInputOnUserInteraction, { once: true });
        
        // Also try on keypress (for keyboard input)
        document.addEventListener('keydown', initializePianoInputOnUserInteraction, { once: true });
        
        // Keyboard shortcut to release all stuck notes (press 'R' key) - like primid_v1_06
        window.addEventListener('keydown', (event) => {
            // Press 'R' to release all notes (useful if notes get stuck)
            if (event.key === 'r' || event.key === 'R') {
                releaseAllNotes();
                console.log('Released all notes (keyboard shortcut)');
            }
            
            // Press 'C' to log camera position
            if (event.key === 'c' || event.key === 'C') {
                if (pianoCamera && pianoControls) {
                    const cameraPos = pianoCamera.position;
                    const cameraRot = pianoCamera.rotation;
                    const target = pianoControls.target;
                    console.log('📷 Camera Position:', {
                        position: {
                            x: cameraPos.x.toFixed(3),
                            y: cameraPos.y.toFixed(3),
                            z: cameraPos.z.toFixed(3)
                        },
                        rotation: {
                            x: cameraRot.x.toFixed(3),
                            y: cameraRot.y.toFixed(3),
                            z: cameraRot.z.toFixed(3)
                        },
                        target: {
                            x: target.x.toFixed(3),
                            y: target.y.toFixed(3),
                            z: target.z.toFixed(3)
                        }
                    });
                } else {
                    console.log('Camera not initialized yet');
                }
            }
        });

        // Region dragging state
        let isDragging = false;
        let dragRegionIndex = -1;
        let dragType = null; // 'start' or 'end'
        let dragStartX = 0;
        let dragStartTime = 0;

        // Click on waveform to select region (double-click to play Anote)
        let lastClickTime = 0;
        let lastClickIndex = -1;
        canvas.addEventListener('click', (e) => {
            if (!audioBuffer || regions.length === 0) return;
            if (isDragging) return; // Don't trigger click if we were dragging

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const duration = audioBuffer.duration;
            const clickTime = (x / canvas.width) * duration;
            const pixelThreshold = 10; // Same threshold as drag detection

            // Check if clicking near a boundary of selected region (don't select if near boundary)
            if (selectedRegionIndex >= 0 && selectedRegionIndex < regions.length) {
                const region = regions[selectedRegionIndex];
                const startX = (region.startTime / duration) * canvas.width;
                const endX = (region.endTime / duration) * canvas.width;
                const distToStart = Math.abs(x - startX);
                const distToEnd = Math.abs(x - endX);
                
                if (distToStart < pixelThreshold || distToEnd < pixelThreshold) {
                    // Clicked near boundary - don't select, allow drag
                    return;
                }
            }
            
            // Find which region was clicked
            for (let i = 0; i < regions.length; i++) {
                const region = regions[i];
                if (clickTime >= region.startTime && clickTime <= region.endTime) {
                    const currentTime = Date.now();
                    // Check for double-click
                    if (currentTime - lastClickTime < 300 && lastClickIndex === i) {
                        // Double-click - play Anote
                        playAnoteWithHarmonics(i);
                        lastClickTime = 0;
                        lastClickIndex = -1;
                    } else {
                        // Single click - select region
                        selectRegion(i);
                        lastClickTime = currentTime;
                        lastClickIndex = i;
                    }
                    break;
                }
            }
        });

        // Mouse down - start dragging region boundaries
        canvas.addEventListener('mousedown', (e) => {
            if (!audioBuffer || regions.length === 0) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const duration = audioBuffer.duration;
            const clickTime = (x / canvas.width) * duration;

            // Only allow dragging boundaries of selected region
            if (selectedRegionIndex >= 0 && selectedRegionIndex < regions.length) {
                const region = regions[selectedRegionIndex];
                const startX = (region.startTime / duration) * canvas.width;
                const endX = (region.endTime / duration) * canvas.width;
                const pixelThreshold = 10; // 10 pixels threshold
                
                const distToStart = Math.abs(x - startX);
                const distToEnd = Math.abs(x - endX);
                
                if (distToStart < pixelThreshold) {
                    isDragging = true;
                    dragRegionIndex = selectedRegionIndex;
                    dragType = 'start';
                    dragStartX = x;
                    dragStartTime = region.startTime;
                    canvas.style.cursor = 'ew-resize';
                    e.preventDefault();
                    return;
                } else if (distToEnd < pixelThreshold) {
                    isDragging = true;
                    dragRegionIndex = selectedRegionIndex;
                    dragType = 'end';
                    dragStartX = x;
                    dragStartTime = region.endTime;
                    canvas.style.cursor = 'ew-resize';
                    e.preventDefault();
                    return;
                }
            }
        });

        // Mouse move - update region boundary while dragging
        canvas.addEventListener('mousemove', (e) => {
            if (!audioBuffer || regions.length === 0) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const duration = audioBuffer.duration;
            const clickTime = (x / canvas.width) * duration;

            if (isDragging && dragRegionIndex >= 0) {
                const region = regions[dragRegionIndex];
                const minDuration = 1.0;
                const maxDuration = 2.0;

                if (dragType === 'start') {
                    // Adjust start time
                    let newStartTime = Math.max(0, Math.min(clickTime, region.endTime - minDuration));
                    // Ensure minimum duration
                    if (region.endTime - newStartTime < minDuration) {
                        newStartTime = region.endTime - minDuration;
                    }
                    // Ensure doesn't overlap with previous region
                    if (dragRegionIndex > 0) {
                        const prevRegion = regions[dragRegionIndex - 1];
                        newStartTime = Math.max(newStartTime, prevRegion.endTime);
                    }
                    region.startTime = newStartTime;
                } else if (dragType === 'end') {
                    // Adjust end time
                    let newEndTime = Math.min(duration, Math.max(clickTime, region.startTime + minDuration));
                    // Ensure minimum duration
                    if (newEndTime - region.startTime < minDuration) {
                        newEndTime = region.startTime + minDuration;
                    }
                    // Ensure doesn't exceed max duration
                    if (newEndTime - region.startTime > maxDuration) {
                        newEndTime = region.startTime + maxDuration;
                    }
                    // Ensure doesn't overlap with next region
                    if (dragRegionIndex < regions.length - 1) {
                        const nextRegion = regions[dragRegionIndex + 1];
                        newEndTime = Math.min(newEndTime, nextRegion.startTime);
                    }
                    region.endTime = newEndTime;
                }

                drawWaveform();
                updateRegionInfo();
            } else {
                // Show resize cursor when near boundaries of selected region
                let nearBoundary = false;
                const pixelThreshold = 10; // 10 pixels threshold for easier targeting
                
                if (selectedRegionIndex >= 0 && selectedRegionIndex < regions.length) {
                    const region = regions[selectedRegionIndex];
                    const startX = (region.startTime / duration) * canvas.width;
                    const endX = (region.endTime / duration) * canvas.width;
                    
                    // Check if mouse is near left or right boundary (within pixel threshold)
                    const distToStart = Math.abs(x - startX);
                    const distToEnd = Math.abs(x - endX);
                    
                    if (distToStart < pixelThreshold || distToEnd < pixelThreshold) {
                        nearBoundary = true;
                    }
                }
                
                canvas.style.cursor = nearBoundary ? 'ew-resize' : 'pointer';
            }
        });

        // Mouse up - stop dragging
        canvas.addEventListener('mouseup', (e) => {
            if (isDragging) {
                isDragging = false;
                dragRegionIndex = -1;
                dragType = null;
                canvas.style.cursor = 'pointer';
            }
        });

        // Mouse leave - stop dragging
        canvas.addEventListener('mouseleave', (e) => {
            if (isDragging) {
                isDragging = false;
                dragRegionIndex = -1;
                dragType = null;
                canvas.style.cursor = 'pointer';
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Delete key - delete selected region
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selectedRegionIndex >= 0 && selectedRegionIndex < regions.length) {
                    e.preventDefault();
                    deleteRegion(selectedRegionIndex);
                }
            }
            // Escape - deselect
            if (e.key === 'Escape') {
                selectedRegionIndex = -1;
                updateRegionInfo();
            }
            // Arrow keys - navigate selection
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                if (regions.length > 0) {
                    e.preventDefault();
                    if (selectedRegionIndex < 0) {
                        selectedRegionIndex = 0;
                    } else {
                        if (e.key === 'ArrowUp') {
                            selectedRegionIndex = Math.max(0, selectedRegionIndex - 1);
                        } else {
                            selectedRegionIndex = Math.min(regions.length - 1, selectedRegionIndex + 1);
                        }
                    }
                    drawWaveform(); // Redraw to show selection border
                    updateRegionInfo();
                }
            }
        });
    </script>
